<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Javascript Web Output #3</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        button {
            margin: 5px;
            padding: 5px 10px;
        }

        table {
            border-collapse: collapse;
            margin-top: 10px;
            width: 100%;
        }

        th, td {
            border: 1px solid black;
            padding: 6px;
        }

        th {
            background-color: #f2f2f2;
        }

        .completed {
            color: green;
            font-weight: bold;
        }

        .not-completed {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Javascript Web Output #3</h2>

<button onclick="loadData()">Load data from the API</button>
<button onclick="clearTable()">Clear Table</button>

<p>
    API:
    <a href="https://jsonplaceholder.typicode.com/todos/" target="_blank">
        https://jsonplaceholder.typicode.com/todos/
    </a>
</p>

<!-- TABLE WILL BE INSERTED HERE -->
<div id="tableContainer"></div>

<script>
function loadData() {
    fetch("https://jsonplaceholder.typicode.com/todos/")
        .then(res => res.json())
        .then(data => {

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Task ID</th>
                            <th>Title</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.slice(0, 15).forEach(item => {
                let statusText = item.completed ? "Completed" : "Not yet Completed";
                let statusClass = item.completed ? "completed" : "not-completed";

                html += `
                    <tr>
                        <td>${item.userId}</td>
                        <td>${item.id}</td>
                        <td>${item.title}</td>
                        <td class="${statusClass}">${statusText}</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;

            document.getElementById("tableContainer").innerHTML = html;
        });
}

function clearTable() {
    document.getElementById("tableContainer").innerHTML = "";
}
</script>

</body>
</html>
